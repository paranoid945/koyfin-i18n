# --- Long feature blurbs ---

My Screens helps you find the right stocks by offering global coverage, extensive data filters, and the ability to combine multiple custom criteria to pinpoint exactly what you need.:
  zh_CN: 「我的筛选」提供全球市场覆盖和丰富的数据筛选条件，并支持组合多个自定义条件，帮你精准找到所需的股票。
  zh_TW: 「我的篩選」提供全球市場覆蓋和豐富的數據篩選條件，並支援組合多個自訂條件，幫你精準找到所需的股票。
  ja: マイスクリーンは、グローバルなカバレッジ、豊富なデータフィルター、複数のカスタム条件の組み合わせにより、最適な銘柄探しをサポートします。
  ko: 내 스크린은 글로벌 커버리지, 다양한 데이터 필터, 여러 사용자 지정 조건의 조합을 통해 원하는 종목을 정확히 찾도록 도와줍니다.
  de: Meine Screens hilft Ihnen, die richtigen Aktien zu finden – mit globaler Abdeckung, umfangreichen Datenfiltern und der Kombination mehrerer eigener Kriterien.
  fr: Mes filtres vous aident à trouver les bonnes actions grâce à une couverture mondiale, des filtres de données étendus et la combinaison de plusieurs critères personnalisés.
  es: Mis filtros le ayuda a encontrar las acciones adecuadas con cobertura global, filtros de datos completos y la combinación de múltiples criterios personalizados.

