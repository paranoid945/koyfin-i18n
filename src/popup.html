<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Koyfin UI Translator</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <img src="../icons/icon32.png" alt="" width="20" height="20" />
      <h1>Koyfin UI Translator</h1>
    </header>

    <label class="row toggle">
      <span>Enable translation</span>
      <input type="checkbox" id="enabled" />
    </label>

    <label class="row">
      <span>Language</span>
      <select id="lang">
        <option value="zh_CN">简体中文</option>
        <option value="zh_TW">繁體中文</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
        <option value="de">Deutsch</option>
        <option value="fr">Français</option>
        <option value="es">Español</option>
      </select>
    </label>

    <hr />

    <label class="row toggle">
      <span>Translate dynamic content<br /><small>market news, descriptions, …</small></span>
      <input type="checkbox" id="dynamic" />
    </label>

    <div id="dynamic-options" hidden>
      <label class="row">
        <span>Engine</span>
        <select id="engine">
          <option value="builtin">Chrome built-in (on-device)</option>
          <option value="google">Google Cloud Translation</option>
        </select>
      </label>

      <label class="row" id="key-row" hidden>
        <span>API key</span>
        <input type="password" id="apikey" placeholder="Google API key" autocomplete="off" />
      </label>

      <p class="note" id="engine-note"></p>

      <div class="row" id="builtin-status-row" hidden>
        <span class="status" id="builtin-status"></span>
        <button id="download-pack" hidden>Enable</button>
      </div>
    </div>

    <p class="note">
      Static interface labels are translated with a fully offline
      dictionary. Changes apply immediately on open Koyfin tabs.
    </p>

    <footer>
      <a href="https://github.com/paranoid945/koyfin-i18n" target="_blank" rel="noreferrer">Open source on GitHub</a>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
