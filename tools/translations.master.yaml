  ja: マイポートフォリオの詳細
  ko: 내 포트폴리오 자세히 알아보기
  de: Mehr über Mein Portfolio erfahren
  fr: En savoir plus sur Mon portefeuille
  es: Más información sobre Mi cartera
My Watchlists allow you to track and organize specific stocks, ETFs, or other securities you're interested in, enabling quick access to key data and performance metrics.:
  zh_CN: 「我的自选」帮你跟踪和整理感兴趣的股票、ETF 或其他证券，快速查看关键数据和表现指标。
  zh_TW: 「我的自選」幫你追蹤和整理感興趣的股票、ETF 或其他證券，快速檢視關鍵數據和表現指標。
  ja: マイウォッチリストでは、関心のある株式・ETF・その他の銘柄を整理して追跡し、主要データやパフォーマンス指標にすばやくアクセスできます。
  ko: 내 관심 목록은 관심 있는 주식, ETF 및 기타 종목을 추적·정리하여 주요 데이터와 성과 지표에 빠르게 접근할 수 있게 해줍니다.
  de: Mit Meine Watchlists verfolgen und organisieren Sie Aktien, ETFs oder andere Wertpapiere und greifen schnell auf wichtige Daten und Performance-Kennzahlen zu.
  fr: Mes listes de surveillance vous permettent de suivre et d'organiser des actions, ETF ou autres titres, avec un accès rapide aux données clés et aux indicateurs de performance.
  es: Mis listas de seguimiento le permiten seguir y organizar acciones, ETF u otros valores, con acceso rápido a datos clave y métricas de rendimiento.
The Financial Analysis section breaks down traditional financial statement views such as income statement, balance sheet, cash flows, and more. Use the pre-made templates, or create your own custom template with hundreds of data points available.:
  zh_CN: 「财务分析」板块拆解利润表、资产负债表、现金流量表等传统财务报表视图。你可以使用预置模板，也可以用数百个数据点创建自定义模板。
  zh_TW: 「財務分析」板塊拆解損益表、資產負債表、現金流量表等傳統財務報表檢視。你可以使用預置範本，也可以用數百個數據點建立自訂範本。
  ja: 財務分析セクションでは、損益計算書・貸借対照表・キャッシュフローなどの伝統的な財務諸表を分解して表示します。既成のテンプレートを使うことも、数百のデータ項目から独自のテンプレートを作ることもできます。
  ko: 재무 분석 섹션은 손익계산서, 재무상태표, 현금흐름표 등 전통적인 재무제표 보기를 제공합니다. 기본 제공 템플릿을 사용하거나 수백 개의 데이터 항목으로 나만의 템플릿을 만들 수 있습니다.
  de: Der Bereich Finanzanalyse gliedert klassische Abschlussansichten wie GuV, Bilanz und Cashflow auf. Nutzen Sie vorgefertigte Vorlagen oder erstellen Sie mit Hunderten von Datenpunkten eigene Vorlagen.
  fr: "La section Analyse financière décompose les états financiers classiques : compte de résultat, bilan, flux de trésorerie, etc. Utilisez les modèles prédéfinis ou créez vos propres modèles avec des centaines de données disponibles."
  es: "La sección de Análisis financiero desglosa los estados financieros tradicionales: estado de resultados, balance, flujos de efectivo y más. Use las plantillas predefinidas o cree su propia plantilla con cientos de datos disponibles."
My Portfolio allows you to track your portfolio in detail with multiple accounts, an aggregated portfolio, individual lots, exposure breakdowns, P/L, and weightings.:
  zh_CN: 「我的投资组合」帮你精细跟踪投资组合：支持多账户、汇总组合、单笔持仓、敞口拆解、盈亏和权重分析。
  zh_TW: 「我的投資組合」幫你精細追蹤投資組合：支援多帳戶、彙總組合、單筆持倉、敞口拆解、損益和權重分析。
  ja: マイポートフォリオでは、複数口座、統合ポートフォリオ、個別ロット、エクスポージャー内訳、損益、ウェイトなど、ポートフォリオを詳細に追跡できます。
  ko: 내 포트폴리오는 여러 계좌, 통합 포트폴리오, 개별 매수 단위, 노출 분석, 손익, 비중까지 포트폴리오를 상세하게 추적할 수 있게 해줍니다.
  de: Mit Mein Portfolio verfolgen Sie Ihr Portfolio im Detail – mit mehreren Konten, einem aggregierten Portfolio, einzelnen Positionen, Exposure-Aufschlüsselungen, G&V und Gewichtungen.
  fr: "Mon portefeuille vous permet de suivre votre portefeuille en détail : comptes multiples, portefeuille agrégé, lots individuels, répartition des expositions, P&L et pondérations."
  es: "Mi cartera le permite seguir su cartera en detalle: múltiples cuentas, cartera agregada, lotes individuales, desglose de exposición, P/G y ponderaciones."

